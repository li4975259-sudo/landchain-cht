services:

  api:

    build:

      context: .

      dockerfile: Dockerfile

    container_name: landchain-api

    ports:

      - "8000:8000"

    env_file:

      - .env

    environment:

      OLLAMA_BASE_URL: http://host.docker.internal:11434

      HF_HOME: /app/storage/hf_cache

      QDRANT_URL: http://qdrant:6333

      POSTGRES_HOST: postgres

    volumes:

      - ./data:/app/data

      - ./storage:/app/storage

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      qdrant:

        condition: service_started

      postgres:

        condition: service_healthy

    restart: unless-stopped

    healthcheck:

      test:

        [

          "CMD",

          "python",

          "-c",

          "import httpx; httpx.get('http://127.0.0.1:8000/health', timeout=5).raise_for_status()",

        ]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 60s



  frontend:

    build:

      context: ./frontend

      dockerfile: Dockerfile

      args:

        VITE_API_BASE_URL: /api

    container_name: landchain-web

    ports:

      - "3000:80"

    depends_on:

      api:

        condition: service_healthy

    restart: unless-stopped



  qdrant:

    image: qdrant/qdrant:v1.12.5

    container_name: landchain-qdrant

    ports:

      - "6333:6333"

      - "6334:6334"

    volumes:

      - qdrant_data:/qdrant/storage

    restart: unless-stopped



  postgres:

    image: postgres:16-alpine

    container_name: landchain-postgres

    ports:

      - "5432:5432"

    environment:

      POSTGRES_USER: ${POSTGRES_USER:-landchain}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landchain}

      POSTGRES_DB: ${POSTGRES_DB:-landchain}

    volumes:

      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landchain} -d ${POSTGRES_DB:-landchain}"]

      interval: 10s

      timeout: 5s

      retries: 5

      start_period: 20s



volumes:

  qdrant_data:

  postgres_data:
